<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufi Heritage - Premium Islamic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #F8FAFC; --text-color: #0F172A; --primary-color: #10B981; --accent-color: #F97316; --card-bg: rgba(255, 255, 255, 0.8); --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); }
        a { text-decoration: none; }
        .header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; padding: 1rem; background: var(--card-bg); backdrop-filter: blur(10px); }
        .site-title { font-size: 1.25rem; font-weight: 700; color: var(--primary-color); }
        .icon-btn { background: none; border: none; padding: 8px; cursor: pointer; }
        .icon-btn svg { width: 24px; height: 24px; stroke: var(--text-color); fill: none; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 280px; height: 100vh; background: var(--card-bg); z-index: 200; transition: transform 0.3s; padding: 1rem; }
        .sidebar-active .sidebar { transform: translateX(320px); }
        .nav-links { list-style: none; margin-top: 2rem; }
        .nav-links a { display: block; padding: 1rem; font-weight: 500; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { background: var(--primary-color); color: white; border-radius: 12px; }
        .page-section { display: none; padding: 1rem; }
        .page-section.active { display: block; }
        .grid-container { display: grid; gap: 1.5rem; }
        .glass-card { background: var(--card-bg); padding: 1.5rem; border-radius: 24px; box-shadow: var(--shadow); }
        .img-small { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 1rem; }
        .img-medium { width: 100%; height: 300px; object-fit: cover; border-radius: 16px; margin-bottom: 1rem; }
        .img-large { width: 100%; height: auto; border-radius: 16px; margin-bottom: 1rem; }
        .card-title { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 0.5rem; }
        .card-content { line-height: 1.8; white-space: pre-wrap; margin-bottom: 1rem; }
        .pdf-btn { display: inline-block; background: var(--accent-color); color: white; padding: 10px 20px; border-radius: 12px; font-weight: 600; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3); }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .gallery-item img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <button class="icon-btn" id="close-sidebar" style="float:right;"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-width="2"/></svg></button>
        <ul class="nav-links">
            <li><a data-target="articles" class="active">Home (Articles)</a></li>
            <li><a data-target="shajra-nasab">Shajra-e-Nasab</a></li>
            <li><a data-target="shajra-tariqat">Shajra-e-Tariqat</a></li>
            <li><a data-target="khanqah">Khanqah</a></li>
            <li><a data-target="sawaneh">Sawaneh Hayat</a></li>
            <li><a data-target="books">Books / Kutub</a></li>
            <li><a data-target="gallery">Gallery</a></li>
        </ul>
    </aside>

    <header class="header">
        <button class="icon-btn" id="menu-btn"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke-width="2"/></svg></button>
        <div class="site-title">Sufi Heritage</div>
        <div style="width:24px;"></div>
    </header>

    <main>
        <div id="articles" class="page-section active"><div id="content-articles" class="grid-container"></div></div>
        <div id="shajra-nasab" class="page-section"><div id="content-shajra-nasab" class="grid-container"></div></div>
        <div id="shajra-tariqat" class="page-section"><div id="content-shajra-tariqat" class="grid-container"></div></div>
        <div id="khanqah" class="page-section"><div id="content-khanqah" class="grid-container"></div></div>
        <div id="sawaneh" class="page-section"><div id="content-sawaneh" class="grid-container"></div></div>
        <div id="books" class="page-section"><div id="content-books" class="grid-container"></div></div>
        <div id="gallery" class="page-section"><div id="content-gallery" class="gallery-grid"></div></div>
    </main>

    <script>
        document.getElementById('menu-btn').addEventListener('click', () => document.body.classList.add('sidebar-active'));
        document.getElementById('close-sidebar').addEventListener('click', () => document.body.classList.remove('sidebar-active'));
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
                document.getElementById(e.target.getAttribute('data-target')).classList.add('active');
                e.target.classList.add('active');
                document.body.classList.remove('sidebar-active');
            });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyChM3EQOo2UNmwFnHwLc3ooq63eEm5uuh8",
            authDomain: "khanqahebukhariya.firebaseapp.com",
            projectId: "khanqahebukhariya",
            storageBucket: "khanqahebukhariya.firebasestorage.app",
            messagingSenderId: "459052789180",
            appId: "1:459052789180:web:67ef47ee77da16275a4fb9"
        });
        const db = getFirestore(app);
        const categories = ["articles", "shajra-nasab", "shajra-tariqat", "khanqah", "sawaneh", "books", "gallery"];
        
        async function fetchAllData() {
            let containers = {};
            categories.forEach(c => { containers[c] = document.getElementById(`content-${c}`); if(containers[c]) containers[c].innerHTML = ''; });
            
            const q = query(collection(db, "website_content"), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                if(containers[data.category]) {
                    if (data.category === "gallery" && data.imageUrl) {
                        containers[data.category].innerHTML += `<div class="gallery-item"><img src="${data.imageUrl}"></div>`;
                    } else {
                        let imgClass = data.imageSize === "small" ? "img-small" : (data.imageSize === "large" ? "img-large" : "img-medium");
                        let imgHtml = data.imageUrl ? `<img src="${data.imageUrl}" class="${imgClass}">` : '';
                        
                        // NAYA: PDF Button Logic
                        let pdfHtml = data.pdfUrl ? `<a href="${data.pdfUrl}" target="_blank" class="pdf-btn">📘 Kitaab Padhein / Download</a>` : '';
                        
                        containers[data.category].innerHTML += `
                            <div class="glass-card">
                                ${imgHtml}
                                <h3 class="card-title">${data.title}</h3>
                                <div class="card-content">${data.content}</div>
                                ${pdfHtml}
                            </div>
                        `;
                    }
                }
            });
        }
        fetchAllData();
    </script>
</body>
    </html>
