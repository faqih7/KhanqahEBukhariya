<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khanqah E Bukhariya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10B981; --bg: #F8FAFC; --text: #0F172A; --white: #ffffff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* Header */
        header { position: sticky; top: 0; background: var(--white); padding: 1rem; display: flex; align-items: center; justify-content: space-between; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        
        /* Sidebar (Hidden by default) */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: var(--white); z-index: 200; transition: 0.3s; padding: 1.5rem; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        #sidebar.active { left: 0; }
        .nav-link { display: block; padding: 1rem; cursor: pointer; border-radius: 12px; font-weight: 500; }
        .nav-link:hover { background: var(--primary); color: white; }

        /* Pages */
        .page { display: none; padding: 1rem; max-width: 800px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* List & Cards */
        .list-item { background: var(--white); padding: 1.2rem; border-radius: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .detail-view { background: var(--white); padding: 1.5rem; border-radius: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .img-large { width: 100%; border-radius: 16px; margin-bottom: 1rem; }
        .pdf-btn { display: block; background: #F97316; color: white; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
        <div id="page-title" style="font-weight:700; color:var(--primary);">Home</div>
        <div style="width:30px;"></div>
    </header>

    <div id="sidebar">
        <button onclick="toggleSidebar(false)" style="float:right; border:none; background:none;">✕</button>
        <div style="margin-top:3rem;">
            <div class="nav-link" onclick="changePage('articles', 'Home')">Home</div>
            <div class="nav-link" onclick="changePage('shajra-nasab', 'Shajra-e-Nasab')">Shajra-e-Nasab</div>
            <div class="nav-link" onclick="changePage('shajra-tariqat', 'Shajra-e-Tariqat')">Shajra-e-Tariqat</div>
            <div class="nav-link" onclick="changePage('khanqah', 'Khanqah')">Khanqah</div>
            <div class="nav-link" onclick="changePage('sawaneh', 'Sawaneh Hayat')">Sawaneh Hayat</div>
            <div class="nav-link" onclick="changePage('books', 'Books / Kutub')">Books / Kutub</div>
            <div class="nav-link" onclick="changePage('gallery', 'Gallery')">Gallery</div>
        </div>
    </div>

    <main id="main-content">
        <!-- Har category ke liye containers -->
        <div id="articles" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="shajra-nasab" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="shajra-tariqat" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="khanqah" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="sawaneh" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="books" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
        <div id="gallery" class="page"><div class="list-container"></div><div class="detail-container"></div></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyChM3EQOo2UNmwFnHwLc3ooq63eEm5uuh8", authDomain: "khanqahebukhariya.firebaseapp.com", projectId: "khanqahebukhariya", storageBucket: "khanqahebukhariya.firebasestorage.app", messagingSenderId: "459052789180", appId: "1:459052789180:web:67ef47ee77da16275a4fb9" }));

        let allData = [];
        async function init() {
            const snap = await getDocs(query(collection(db, "website_content"), orderBy("timestamp", "desc")));
            snap.forEach(d => allData.push({ id: d.id, ...d.data() }));
            changePage('articles', 'Home');
        }

        window.toggleSidebar = (show) => document.getElementById('sidebar').className = show ? 'active' : '';

        window.changePage = (cat, title) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(cat).classList.add('active');
            document.getElementById('page-title').innerText = title;
            renderList(cat);
            toggleSidebar(false);
        };

        window.renderList = (cat) => {
            const listDiv = document.querySelector(`#${cat} .list-container`);
            const detailDiv = document.querySelector(`#${cat} .detail-container`);
            listDiv.classList.remove('hidden');
            detailDiv.classList.add('hidden');
            listDiv.innerHTML = '';
            
            allData.filter(d => d.category === cat).forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${item.title || "Untitled"}</span><span>→</span>`;
                div.onclick = () => {
                    listDiv.classList.add('hidden');
                    detailDiv.classList.remove('hidden');
                    detailDiv.innerHTML = `
                        <button onclick="renderList('${cat}')" style="margin-bottom:1rem;">⬅ Back</button>
                        ${item.imageUrl ? `<img src="${item.imageUrl}" class="img-large">` : ''}
                        <h2>${item.title || ""}</h2>
                        <p style="white-space:pre-wrap; margin:1rem 0;">${item.content || ""}</p>
                        ${item.pdfUrl ? `<a href="${item.pdfUrl}" class="pdf-btn">📘 Read PDF</a>` : ''}
                    `;
                };
                listDiv.appendChild(div);
            });
        };
        init();
    </script>
</body>
</html>
