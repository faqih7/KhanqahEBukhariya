<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Custom Islamic App</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Nunito:wght@400;700&family=Comic+Neue:wght@700&family=Amiri+Quran&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --app-bg: #FDF8ED; 
            --app-font: 'Poppins', sans-serif;
            --arabic-font: 'Amiri Quran', serif;
            --card-radius: 20px;
            --nav-bg: #FFC107;
            --text-color: #333333;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
            --custom-btn-bg: #3b82f6;
            --custom-btn-text: #ffffff;
            --custom-btn-radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--app-font); -webkit-tap-highlight-color: transparent; }
        body { background: var(--app-bg); color: var(--text-color); overflow: hidden; }

        #app-container { height: 100vh; width: 100vw; position: relative; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transform: translateX(20px); transition: var(--transition); }
        .screen.active { opacity: 1; visibility: visible; transform: translateX(0); z-index: 10; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }

        .top-banner { background: var(--nav-bg); padding: 25px 20px; border-radius: var(--card-radius); margin-bottom: 20px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; }
        .top-banner h1 { font-size: 1.5rem; font-weight: 700; }
        .top-banner p { font-size: 1rem; font-weight: 500; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .category-card { border-radius: var(--card-radius); padding: 15px 10px; text-align: center; cursor: pointer; transition: var(--transition); box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100px; background-color: #ffffff; border: 2px solid #f0f0f0; }
        .category-card:active { transform: scale(0.92); }
        
        .category-card img.custom-icon { margin-bottom: 8px; width: 40px; height: 40px; object-fit: contain; }
        .category-card svg { margin-bottom: 8px; width: 32px; height: 32px; color: var(--text-color); }
        .category-card span { font-size: 0.8rem; font-weight: 600; }

        .screen-header { display: flex; align-items: center; padding: 15px 20px; gap: 15px; background: transparent; z-index: 20; }
        .dynamic-btn { background: var(--custom-btn-bg); color: var(--custom-btn-text); border: none; padding: 10px 15px; border-radius: var(--custom-btn-radius); box-shadow: var(--card-shadow); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .screen-header h2 { font-size: 1.2rem; font-weight: 700; flex: 1; text-align: center; margin-right: 40px; }

        .ayat-box { background: white; padding: 20px; border-radius: var(--card-radius); box-shadow: var(--card-shadow); margin-bottom: 15px; border: 2px solid #f0f0f0; display: flex; flex-direction: column; }
        .ayat-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .quran-text { font-family: var(--arabic-font); font-size: 1.8rem; text-align: right; line-height: 3rem; margin-bottom: 15px; }
        .translation-text { font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; color: #555; }
        
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: var(--nav-bg); display: flex; justify-content: center; gap: 60px; align-items: center; z-index: 40; border-top-left-radius: var(--card-radius); border-top-right-radius: var(--card-radius); box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; color: rgba(0,0,0,0.5); font-size: 0.8rem; font-weight: 700; gap: 5px; transition: var(--transition); cursor: pointer; }
        .nav-item.active { color: #000; transform: translateY(-5px); }
    </style>
</head>
<body>
        <div id="app-container">
        
        <!-- HOME SCREEN -->
        <section id="screen-home" class="screen active">
            <main class="content-scroll">
                <div class="top-banner">
                    <div>
                        <h1 id="app-greeting">Assalamu Alaikum</h1>
                        <p id="app-subgreeting">Let's learn today!</p>
                    </div>
                </div>
                <div class="grid-container" id="category-grid">
                    <!-- Dynamic Categories will appear here -->
                </div>
            </main>
        </section>

        <!-- LESSON SCREEN -->
        <section id="screen-lesson" class="screen">
            <div class="screen-header">
                <button class="dynamic-btn" onclick="navigate('screen-home')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h2 id="lesson-title">Lesson</h2>
            </div>
            <main class="content-scroll" id="lesson-content-area"></main>
        </section>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="navigate('screen-home')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="26" height="26" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>Home</span>
            </button>
        </nav>
        </div>
            <!-- Firebase Real-time Sync Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARipbpqrtoB5dsH05xGyqc8mM30sCoPQc",
            authDomain: "kids-islamic-31aff.firebaseapp.com",
            projectId: "kids-islamic-31aff",
            storageBucket: "kids-islamic-31aff.firebasestorage.app",
            messagingSenderId: "131783238650",
            appId: "1:131783238650:web:e7fe13d44cb6dc1410ba43",
            measurementId: "G-N7E3JJJM4Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let categoriesData = [];
        let iconsData = [];

        // Listen to Settings
        onSnapshot(doc(db, "appDatabase", "settings"), (docSnap) => {
            if (docSnap.exists()) {
                const savedSettings = docSnap.data();
                document.documentElement.style.setProperty('--app-bg', savedSettings.appBg || '#FDF8ED');
                document.documentElement.style.setProperty('--nav-bg', savedSettings.navBg || '#FFC107');
                document.documentElement.style.setProperty('--app-font', savedSettings.primaryFont || "'Poppins', sans-serif");
                document.documentElement.style.setProperty('--arabic-font', savedSettings.arabicFont || "'Amiri Quran', serif");
                document.documentElement.style.setProperty('--card-radius', (savedSettings.shape || 20) + 'px');
                if(savedSettings.greetingText) document.getElementById('app-greeting').innerText = savedSettings.greetingText;
            }
        });

        // Listen to Shapes
        onSnapshot(doc(db, "appDatabase", "shapes"), (docSnap) => {
            if (docSnap.exists()) {
                const savedShapes = docSnap.data().items || [];
                if(savedShapes.length > 0) {
                    const latestShape = savedShapes[savedShapes.length - 1];
                    document.documentElement.style.setProperty('--custom-btn-bg', latestShape.bg);
                    document.documentElement.style.setProperty('--custom-btn-text', latestShape.textColor);
                    document.documentElement.style.setProperty('--custom-btn-radius', latestShape.radius + 'px');
                }
            }
        });

        // Listen to Custom Icons & Categories
        onSnapshot(doc(db, "appDatabase", "icons"), (docSnap) => {
            if (docSnap.exists()) { iconsData = docSnap.data().items || []; renderContent(); }
        });
        onSnapshot(doc(db, "appDatabase", "categories"), (docSnap) => {
            if (docSnap.exists()) { categoriesData = docSnap.data().items || []; renderContent(); }
        });

        function renderContent() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            
            if(categoriesData.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 3; text-align: center; color: #888;">Fetching data from Firebase...</p>';
                return;
            }

            categoriesData.forEach((cat, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.backgroundColor = cat.iconColor || '#ffffff';
                
                let iconHTML = iconsData[index] 
                    ? `<img src="${iconsData[index]}" class="custom-icon" alt="icon">` 
                    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`;

                card.innerHTML = `${iconHTML} <span>${cat.title}</span>`;
                card.onclick = () => window.openLesson(cat);
                grid.appendChild(card);
            });
        }

        window.openLesson = function(category) {
            document.getElementById('lesson-title').innerText = category.title;
            const contentArea = document.getElementById('lesson-content-area');
            contentArea.innerHTML = '';

            const ayats = category.items || [];
            ayats.forEach((item) => {
                const box = document.createElement('div');
                box.className = 'ayat-box';
                let imageHTML = item.optImage ? `<img src="${item.optImage}" class="ayat-img" style="display:block;">` : '';

                box.innerHTML = `
                    ${imageHTML}
                    <div class="quran-text" style="color: ${item.textColor || '#111'};">${item.arabic}</div>
                    <div class="translation-text">${item.translation}</div>
                    <button class="dynamic-btn" style="width: 50px; height: 50px; border-radius: 50%; padding: 0;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                `;
                contentArea.appendChild(box);
            });
            window.navigate('screen-lesson');
        }

        window.navigate = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
