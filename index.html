<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khanqah E Bukhariya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #10B981; --bg-color: #F8FAFC; --card-bg: #ffffff; }
        body { background: var(--bg-color); color: #0F172A; margin: 0; font-family: 'Poppins', sans-serif; }
        .header { position: sticky; top: 0; background: var(--card-bg); padding: 1rem; display: flex; align-items: center; justify-content: space-between; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .page-section { display: none; padding: 1rem; max-width: 800px; margin: 0 auto; }
        .page-section.active { display: block; }
        .list-item { background: var(--card-bg); padding: 1.2rem; border-radius: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .detail-view { background: var(--card-bg); padding: 1.5rem; border-radius: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .img-large { width: 100%; border-radius: 16px; margin-bottom: 1rem; }
        .pdf-btn { display: block; background: #F97316; color: white; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; margin-top: 1rem; }
        .hidden { display: none; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: white; z-index: 200; transition: 0.3s; padding: 1rem; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        .sidebar-active #sidebar { transform: translateX(280px); }
    </style>
</head>
<body>

    <header class="header">
        <button id="menu-btn" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">☰</button>
        <div id="page-title" style="font-weight:700; color:var(--primary-color);">Home</div>
        <div style="width:30px;"></div>
    </header>

    <div id="sidebar">
        <button onclick="toggleMenu()" style="float:right; border:none; background:none; font-size:1.2rem;">✕</button>
        <ul style="list-style:none; margin-top:3rem;">
            <li><a style="display:block; padding:1rem; cursor:pointer;" onclick="navigate('articles', 'Home')">Home</a></li>
            <li><a style="display:block; padding:1rem; cursor:pointer;" onclick="navigate('shajra-nasab', 'Shajra-e-Nasab')">Shajra-e-Nasab</a></li>
            <li><a style="display:block; padding:1rem; cursor:pointer;" onclick="navigate('books', 'Books / Kutub')">Books / Kutub</a></li>
        </ul>
    </div>

    <main id="main-content">
        <!-- Articles Section -->
        <div id="articles" class="page-section active">
            <div id="list-articles"></div>
            <div id="detail-articles" class="detail-view hidden"></div>
        </div>
        <!-- Other sections will be rendered similarly -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyChM3EQOo2UNmwFnHwLc3ooq63eEm5uuh8", authDomain: "khanqahebukhariya.firebaseapp.com", projectId: "khanqahebukhariya", storageBucket: "khanqahebukhariya.firebasestorage.app", messagingSenderId: "459052789180", appId: "1:459052789180:web:67ef47ee77da16275a4fb9" }));

        let allData = [];
        async function loadData() {
            const snapshot = await getDocs(query(collection(db, "website_content"), orderBy("timestamp", "desc")));
            snapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
            renderList('articles');
        }

        window.renderList = (cat) => {
            const container = document.getElementById(`list-${cat}`);
            const detail = document.getElementById(`detail-${cat}`);
            container.classList.remove('hidden');
            detail.classList.add('hidden');
            container.innerHTML = '';
            
            allData.filter(d => d.category === cat).forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${item.title || "Untitled Post"}</span><span>→</span>`;
                div.onclick = () => showDetail(cat, item);
                container.appendChild(div);
            });
        };

        window.showDetail = (cat, item) => {
            const list = document.getElementById(`list-${cat}`);
            const detail = document.getElementById(`detail-${cat}`);
            list.classList.add('hidden');
            detail.classList.remove('hidden');
            
            detail.innerHTML = `
                <button onclick="renderList('${cat}')" style="margin-bottom:1rem;">⬅ Wapas</button>
                ${item.imageUrl ? `<img src="${item.imageUrl}" class="img-large">` : ''}
                <h2>${item.title || ""}</h2>
                <p style="white-space:pre-wrap; margin:1rem 0;">${item.content || ""}</p>
                ${item.pdfUrl ? `<a href="${item.pdfUrl}" class="pdf-btn">📘 Read PDF</a>` : ''}
            `;
            // History push for back button support inside article
            history.pushState({view: 'detail'}, "");
        };

        window.navigate = (target, title) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(target).classList.add('active');
            document.getElementById('page-title').innerText = title;
            toggleMenu();
        };

        window.toggleMenu = () => document.body.classList.toggle('sidebar-active');
        document.getElementById('menu-btn').onclick = toggleMenu;

        // Smart Back Button
        window.addEventListener('popstate', (e) => {
            if(document.body.classList.contains('sidebar-active')) {
                toggleMenu();
            } else if (!document.getElementById('list-articles').classList.contains('hidden')) {
                // If on list, let system back button exit the app
            } else {
                renderList('articles'); // Go back to list
            }
        });

        loadData();
    </script>
</body>
</html>
