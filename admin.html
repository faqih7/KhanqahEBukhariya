<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin Panel - Sufi Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #F8FAFC; color: #0F172A; padding: 1.5rem; padding-bottom: 5rem; }
        .admin-container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #10B981; margin-bottom: 1.5rem; text-align: center; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155; }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #10B981; }
        .btn { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; padding: 1rem 2rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1.1rem; width: 100%; }
        .post-list { margin-top: 3rem; border-top: 2px solid #e2e8f0; padding-top: 2rem; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .post-item { background: #f1f5f9; padding: 1.2rem; border-radius: 16px; margin-bottom: 1rem; border-left: 5px solid #10B981; }
        .post-badge { background: #10B981; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; margin-top: 10px;}
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .popup-box { background: white; padding: 2rem; border-radius: 24px; text-align: center; width: 350px; }
        .popup-btn { background: #10B981; color: white; border: none; padding: 0.6rem 2rem; border-radius: 12px; margin-top: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Add New Content</h1>
        <div id="adminForm">
            <div class="form-group">
                <label>Category (Kahan upload karna hai?)</label>
                <select id="postCategory">
                    <option value="articles">Latest Articles (Home)</option>
                    <option value="shajra-nasab">Shajra-e-Nasab</option>
                    <option value="shajra-tariqat">Shajra-e-Tariqat</option>
                    <option value="khanqah">Khanqah</option>
                    <option value="sawaneh">Sawaneh Hayat</option>
                    <option value="books">Books / Kutub</option>
                    <option value="gallery">Gallery</option>
                </select>
            </div>
            <div class="form-group">
                <label>Title (Unwan)</label>
                <input type="text" id="postTitle" placeholder="Unwan likhein...">
            </div>
            <div class="form-group">
                <label>Image Link (Tasveer ka Link - Agar hai)</label>
                <input type="text" id="postImage" placeholder="Tasveer ka link paste karein...">
            </div>
            <div class="form-group">
                <label>Image Size</label>
                <select id="postImageSize">
                    <option value="medium">Darmiyana</option>
                    <option value="small">Chota</option>
                    <option value="large">Bada (Full)</option>
                </select>
            </div>
            
            <!-- NAYA: PDF Link ka box -->
            <div class="form-group">
                <label style="color:#F97316;">PDF Link (Agar kitaab hai toh Google Drive link daalein)</label>
                <input type="text" id="postPdf" placeholder="Google Drive ka PDF link yahan paste karein...">
            </div>

            <div class="form-group">
                <label>Content (Tafseel)</label>
                <textarea id="postContent" rows="6" placeholder="Tafseel likhein..."></textarea>
            </div>
            <button class="btn" id="uploadBtn">Save & Upload</button>
        </div>

        <div class="post-list">
            <div class="history-header">
                <h2>Upload History</h2>
                <span id="totalCount" class="post-badge">Total: 0</span>
            </div>
            <div id="postsContainer">Data load ho raha hai...</div>
        </div>
    </div>

    <div class="popup-overlay" id="successPopup">
        <div class="popup-box" id="popupBox">
            <h2 style="color: #10B981;">Upload Successful!</h2>
            <button class="popup-btn" onclick="document.getElementById('successPopup').style.display='none'">Theek Hai</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChM3EQOo2UNmwFnHwLc3ooq63eEm5uuh8",
            authDomain: "khanqahebukhariya.firebaseapp.com",
            projectId: "khanqahebukhariya",
            storageBucket: "khanqahebukhariya.firebasestorage.app",
            messagingSenderId: "459052789180",
            appId: "1:459052789180:web:67ef47ee77da16275a4fb9",
            measurementId: "G-KVBGJEWEXP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            const imageSize = document.getElementById('postImageSize').value;
            const content = document.getElementById('postContent').value;
            const imageUrl = document.getElementById('postImage').value;
            const pdfUrl = document.getElementById('postPdf').value; // PDF LINK LIA

            if(!title || !content) { alert("Title aur Content zaroori hai!"); return; }

            try {
                await addDoc(collection(db, "website_content"), {
                    category, title, imageSize, content, imageUrl, pdfUrl, // PDF LINK SAVE KIA
                    timestamp: new Date().getTime()
                });
                
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('postPdf').value = ''; // NAYA
                
                document.getElementById('successPopup').style.display = 'flex';
                loadHistory();
            } catch (e) { alert("Error: " + e.message); }
        });

        async function loadHistory() {
            const container = document.getElementById('postsContainer');
            const totalCount = document.getElementById('totalCount');
            try {
                const q = query(collection(db, "website_content"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = ''; 
                let count = 0;
                querySnapshot.forEach((documentSnapshot) => {
                    count++;
                    const data = documentSnapshot.data();
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'post-item';
                    itemDiv.innerHTML = `<h3>${data.title}</h3><span class="post-badge">${data.category.toUpperCase()}</span>`;
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn-delete';
                    deleteBtn.textContent = '🗑️ Delete Content';
                    deleteBtn.addEventListener('click', async () => {
                        if(confirm("Waqa'i delete karna chahte hain?")) {
                            await deleteDoc(doc(db, "website_content", documentSnapshot.id));
                            loadHistory();
                        }
                    });
                    itemDiv.appendChild(deleteBtn);
                    container.appendChild(itemDiv);
                });
                totalCount.innerText = `Total: ${count}`;
            } catch (e) {}
        }
        loadHistory();
    </script>
</body>
    </html>
